name: Publish Executed Notebooks

on:
  push:
    branches: [main]
    paths-ignore:
      - "executed/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execute-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip -r requirements.txt nbclient

      - name: Execute notebooks
        run: python scripts/execute_notebooks.py

      - name: Commit executed notebooks
        run: |
          if git diff --quiet -- executed; then
            echo "No executed notebook changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add executed
          git commit -m "Update executed notebooks [skip ci]"
          git push origin HEAD:main

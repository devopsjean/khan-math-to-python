name: Notebook Check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-notebooks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validator dependency
        run: python -m pip install --upgrade pip nbformat

      - name: Validate .ipynb files
        run: |
          python - <<'PY'
          from pathlib import Path
          import nbformat

          notebooks = sorted(Path(".").rglob("*.ipynb"))
          if not notebooks:
              raise SystemExit("No .ipynb files found.")

          errors = []
          for nb_path in notebooks:
              if nb_path.stat().st_size == 0:
                  errors.append(f"{nb_path}: file is empty")
                  continue

              try:
                  nb = nbformat.read(nb_path, as_version=4)
                  nbformat.validate(nb)
              except Exception as exc:
                  errors.append(f"{nb_path}: {exc}")

          if errors:
              raise SystemExit("Notebook validation failed:\n" + "\n".join(errors))

          print(f"Validated {len(notebooks)} notebook(s).")
          PY
